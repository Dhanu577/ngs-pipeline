<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NGS Pipeline{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                🧬 NGS Pipeline
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/submit">Submit Job</a></li>
                <li><a href="/jobs">My Jobs</a></li>
            </ul>
        </div>
    </nav>
    
    {% block content %}{% endblock %}
    
    <div class="footer">
        <p>🧬 NGS Data Processing Pipeline v0.3.0 | Built with ❤️ for bioinformatics research</p>
        <p style="font-size: 0.9rem; margin-top: 0.5rem;">© 2026 Danuska | Open Source</p>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
