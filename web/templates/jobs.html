{% extends "base.html" %}

{% block title %}My Jobs - NGS Pipeline{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <h2>Your Analysis Jobs</h2>
        
        <div id="jobsList" style="margin-top: 1.5rem;">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading jobs...</p>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadJobs() {
        try {
            const res = await fetch('/api/jobs');
            const jobs = await res.json();
            
            const container = document.getElementById('jobsList');
            
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem;">
                        <p style="font-size: 1.1rem; color: #718096; margin-bottom: 1rem;">No analysis jobs yet</p>
                        <a href="/submit" class="btn btn-primary">Start Your First Analysis</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <div class="job-header">
                        <div class="job-info">
                            <h3>Analysis ${job.job_id}</h3>
                            <p>Created: ${new Date(job.created_at).toLocaleString()}</p>
                        </div>
                        <span class="badge badge-${job.status}">${job.status.toUpperCase()}</span>
                    </div>
                    
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${job.progress}%;"></div>
                    </div>
                    <p style="font-size: 0.85rem; color: #718096; margin: 0.5rem 0;">Progress: ${job.progress}%</p>
                    
                    ${job.status === 'completed' ? `
                        <div class="job-actions">
                            <button class="btn btn-success btn-small" onclick="downloadReport('${job.job_id}')">
                                📄 Download Report
                            </button>
                            <button class="btn btn-primary btn-small" onclick="downloadResults('${job.job_id}')">
                                📦 Download Results
                            </button>
                        </div>
                    ` : ''}
                    
                    ${job.status === 'failed' ? `
                        <div style="padding: 1rem; background: #fff5f5; border-radius: 8px; margin-top: 1rem; border-left: 3px solid #f56565;">
                            <p style="margin: 0; color: #c53030; font-weight: 500;">❌ Error: ${job.error || 'Unknown error'}</p>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading jobs:', error);
        }
    }
    
    function downloadReport(jobId) {
        window.location.href = `/api/job/${jobId}/report`;
    }
    
    function downloadResults(jobId) {
        window.location.href = `/api/job/${jobId}/download`;
    }
    
    loadJobs();
    setInterval(loadJobs, 3000);
</script>
{% endblock %}
